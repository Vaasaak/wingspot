# Nastavení pro nasazení na Netlify
[build]
  command = "npm run build"
  publish = "dist"

[functions]
  directory = "netlify/functions"

[functions."warm-cache"]
  schedule = "@hourly"

# Aby PWA fungovala správně, service worker se nemá kešovat
[[headers]]
  for = "/sw.js"
  [headers.values]
    Cache-Control = "no-cache"
