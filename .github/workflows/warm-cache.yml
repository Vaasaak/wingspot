name: Hourly cache warm-up

on:
  schedule:
    - cron: '0 * * * *'   # každou hodinu
  workflow_dispatch:        # možnost spustit ručně z GitHub UI

jobs:
  warm-cache:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger warm-cache function
        run: |
          STATUS=$(curl -s -o /tmp/response.json -w "%{http_code}" \
            -H "X-Warm-Cache-Secret: ${{ secrets.WARM_CACHE_SECRET }}" \
            "https://windspots.eu/api/warm-cache")
          cat /tmp/response.json
          echo ""
          if [ "$STATUS" != "200" ]; then
            echo "ERROR: HTTP $STATUS"
            exit 1
          fi
