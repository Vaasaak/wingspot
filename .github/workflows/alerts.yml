name: Daily wind alerts

on:
  schedule:
    - cron: '0 5 * * *'   # každý den v 6:00 SEČ (= 5:00 UTC)
  workflow_dispatch:        # možnost spustit ručně z GitHub UI

jobs:
  send-alerts:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger send-alerts function
        run: |
          STATUS=$(curl -s -o /tmp/response.json -w "%{http_code}" \
            -H "X-Alert-Secret: ${{ secrets.ALERT_SECRET }}" \
            "https://windspots.eu/api/send-alerts")
          cat /tmp/response.json
          echo ""
          if [ "$STATUS" != "200" ]; then
            echo "ERROR: HTTP $STATUS"
            exit 1
          fi
